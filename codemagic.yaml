workflows:
  ios-workflow:
    name: iOS Ilovani Yig'ish
    instance_type: mac_mini_m2
    environment:
      node: latest
      xcode: latest
      cocoapods: default
    scripts:
      - name: Paketlarni o'rnatish va Capacitor tayyorlash
        script: |
          npm install
          rm -rf ios
          npx cap add ios
      - name: Mac kompyuterida Podfile ni majburan yaratish va o'rnatish
        script: |
          cd ios/App
          echo "target 'App' do" > Podfile
          echo "  use_frameworks!" >> Podfile
          echo "  pod 'Capacitor'" >> Podfile
          echo "  pod 'CapacitorCordova'" >> Podfile
          echo "end" >> Podfile
          pod install
      - name: Xcode orqali yig'ish (Sertifikatsiz test)
        script: |
          cd ios/App
          xcodebuild build -workspace App.xcworkspace -scheme App -destination 'generic/platform=iOS Simulator' CODE_SIGNING_ALLOWED=NO