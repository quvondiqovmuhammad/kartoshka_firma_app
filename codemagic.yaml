workflows:
  ios-workflow:
    name: iOS Ilovani Yig'ish
    instance_type: mac_mini_m2
    environment:
      node: latest
      xcode: latest
      cocoapods: default
    scripts:
      - name: 1. Paketlarni o'rnatish
        script: npm install
      - name: 2. Capacitor sinxronlash
        script: npx cap sync ios
      - name: 3. iOS kutubxonalarini ulash
        script: |
          cd ios/App
          pod install
      - name: 4. Xcode orqali yig'ish (Sertifikatsiz test)
        script: |
          cd ios/App
          xcodebuild build -workspace App.xcworkspace -scheme App -destination 'generic/platform=iOS Simulator' CODE_SIGNING_ALLOWED=NO