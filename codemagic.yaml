workflows:
  ios-workflow:
    name: iOS Ilovani Yig'ish
    instance_type: mac_mini_m2
    environment:
      node: latest
      xcode: latest
      cocoapods: default
    scripts:
      - name: 1. Tayyorgarlik (Yashirin xatoni yo'q qilish)
        script: |
          mkdir -p dist
          echo "ok" > dist/index.html
          npm install
          npm install @capacitor/ios
      - name: 2. iOS ni Mac muhitida toza yaratish
        script: |
          rm -rf ios
          npx cap add ios
          npx cap sync ios
      - name: 3. Kutubxonalarni majburiy yangilash
        script: |
          cd ios/App
          pod install --repo-update
      - name: 4. Xcode orqali yig'ish (Sertifikatsiz)
        script: |
          cd ios/App
          xcodebuild build -workspace App.xcworkspace -scheme App -destination 'generic/platform=iOS Simulator' CODE_SIGNING_ALLOWED=NO